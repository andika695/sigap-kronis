# Konfigurasi Apache untuk container SIGAP-Kronis.

# Tanpa ini .htaccess aplikasi diabaikan — bawaan Debian AllowOverride None.
<Directory /var/www/html>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# Teruskan kredensial basis data dari environment container ke PHP.
# Cadangan kalau getenv() tidak melihatnya; config.php membaca $_SERVER juga.
PassEnv SIGAP_DB_HOST
PassEnv SIGAP_DB_PORT
PassEnv SIGAP_DB_NAME
PassEnv SIGAP_DB_USER
PassEnv SIGAP_DB_PASS

# Meredam peringatan "Could not reliably determine the server's FQDN".
ServerName localhost

# Jangan bocorkan versi Apache/PHP di header maupun halaman error.
ServerTokens Prod
ServerSignature Off
